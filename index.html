<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sub-20 Build — Training Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#11241B;
    --bg-card:#16291E;
    --bg-card-hover:#1C3226;
    --bg-row:#142519;
    --line:#2C4533;
    --line-soft:#1F3527;
    --chalk:#F2EFE4;
    --chalk-dim:#A9B6A6;
    --chalk-faint:#6F7E73;
    --gold:#D9A441;
    --rust:#C1542C;
    --amber:#E0883B;
    --sky:#6E9BB3;
    --teal:#4F9D8C;
    --violet:#8E7AA8;
    --gray:#5C6B5F;
    --steel:#94A7B0;
    --font-display:'Anton', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--chalk);
    font-family:var(--font-body);
    background-image:
      radial-gradient(ellipse at top, rgba(217,164,65,0.06), transparent 55%),
      repeating-linear-gradient(transparent, transparent 79px, rgba(242,239,228,0.018) 80px);
    min-height:100vh;
    padding:0 0 60px 0;
  }
  .wrap{max-width:720px; margin:0 auto; padding:0 18px;}

  /* HEADER */
  header{
    padding:36px 18px 26px;
    border-bottom:1px solid var(--line);
    margin-bottom:24px;
  }
  .eyebrow{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.18em;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  h1{
    font-family:var(--font-display);
    font-size:clamp(34px, 7vw, 52px);
    letter-spacing:0.01em;
    margin:0 0 18px 0;
    line-height:0.95;
    text-transform:uppercase;
  }
  h1 span{color:var(--gold);}

  .headline-row{
    display:flex;
    align-items:center;
    gap:22px;
    flex-wrap:wrap;
  }
  .clock-badge{
    width:84px; height:84px;
    border-radius:50%;
    border:2px solid var(--gold);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    flex-shrink:0;
    background:radial-gradient(circle, rgba(217,164,65,0.10), transparent 70%);
  }
  .clock-badge .num{
    font-family:var(--font-display);
    font-size:28px;
    line-height:1;
    color:var(--gold);
  }
  .clock-badge .lbl{
    font-family:var(--font-mono);
    font-size:8px;
    letter-spacing:0.1em;
    color:var(--chalk-dim);
    text-transform:uppercase;
    margin-top:2px;
  }
  .race-meta{flex:1; min-width:180px;}
  .race-meta .race-date{
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--chalk-dim);
  }
  .progress-track{
    margin-top:8px;
    height:6px;
    background:var(--line-soft);
    border-radius:3px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--rust), var(--gold));
    border-radius:3px;
    transition:width 0.4s ease;
  }
  .progress-text{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--chalk-faint);
    margin-top:6px;
  }

  /* SECTION TITLES */
  .section-title{
    font-family:var(--font-display);
    font-size:15px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--chalk-dim);
    margin:0 0 12px 4px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .section-title::before{
    content:'';
    width:14px; height:2px;
    background:var(--gold);
    display:inline-block;
  }

  /* WEIGHT CARD */
  .card{
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:4px;
    padding:20px;
    margin-bottom:30px;
  }
  .weight-input-row{
    display:flex;
    gap:10px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .weight-input-row input[type="number"]{
    flex:1;
    min-width:100px;
    background:var(--bg);
    border:1px solid var(--line);
    color:var(--chalk);
    font-family:var(--font-mono);
    font-size:16px;
    padding:10px 12px;
    border-radius:3px;
  }
  .weight-input-row input[type="date"]{
    background:var(--bg);
    border:1px solid var(--line);
    color:var(--chalk-dim);
    font-family:var(--font-mono);
    font-size:13px;
    padding:10px 10px;
    border-radius:3px;
  }
  .weight-input-row input:focus{outline:2px solid var(--gold); outline-offset:1px;}
  .log-btn{
    background:var(--gold);
    color:var(--bg);
    border:none;
    font-family:var(--font-mono);
    font-weight:700;
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:10px 18px;
    border-radius:3px;
    cursor:pointer;
    transition:filter 0.15s;
  }
  .log-btn:hover{filter:brightness(1.1);}
  .log-btn:focus-visible{outline:2px solid var(--chalk); outline-offset:2px;}

  .weight-stats{
    display:flex;
    gap:24px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .stat{font-family:var(--font-mono);}
  .stat .v{font-size:22px; color:var(--chalk); display:block;}
  .stat .l{font-size:10px; color:var(--chalk-faint); text-transform:uppercase; letter-spacing:0.08em;}

  #sparkline-wrap{margin-bottom:14px;}
  #sparkline-wrap svg{width:100%; height:60px; display:block;}

  .weight-log-list{max-height:160px; overflow-y:auto;}
  .weight-row{
    display:flex;
    justify-content:space-between;
    font-family:var(--font-mono);
    font-size:12.5px;
    padding:6px 0;
    border-bottom:1px solid var(--line-soft);
    color:var(--chalk-dim);
  }
  .weight-row:last-child{border-bottom:none;}
  .weight-row .d{color:var(--chalk-faint);}
  .weight-row .w{color:var(--chalk);}
  .weight-row .delete-w{
    background:none; border:none; color:var(--rust);
    cursor:pointer; font-size:14px; padding:0 4px;
  }
  .empty-note{font-family:var(--font-mono); font-size:12px; color:var(--chalk-faint);}

  /* WEEK BLOCKS */
  .week-block{margin-bottom:28px;}
  .week-header{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:8px 4px;
    border-bottom:1px solid var(--line);
    margin-bottom:8px;
  }
  .week-header .wk-num{
    font-family:var(--font-display);
    font-size:18px;
    color:var(--chalk);
    text-transform:uppercase;
    letter-spacing:0.03em;
  }
  .week-header .wk-label{
    font-family:var(--font-mono);
    font-size:10px;
    color:var(--gold);
    letter-spacing:0.1em;
    text-transform:uppercase;
  }

  .day-row{
    display:flex;
    align-items:flex-start;
    gap:12px;
    padding:11px 8px;
    border-radius:3px;
    margin-bottom:3px;
    background:var(--bg-row);
    transition:background 0.15s;
  }
  .day-row:hover{background:var(--bg-card-hover);}
  .day-row.checked{opacity:0.55;}
  .day-row.race-day{
    background:linear-gradient(90deg, rgba(217,164,65,0.12), var(--bg-row));
    border:1px solid rgba(217,164,65,0.4);
  }

  .checkbox{
    width:22px; height:22px;
    flex-shrink:0;
    border:2px solid var(--chalk-faint);
    border-radius:3px;
    cursor:pointer;
    margin-top:2px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:transparent;
    transition:all 0.15s;
  }
  .checkbox:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
  .checkbox.on{
    background:var(--teal);
    border-color:var(--teal);
  }
  .checkbox.on::after{
    content:'✓';
    color:var(--bg);
    font-size:14px;
    font-weight:700;
  }

  .day-content{flex:1; min-width:0;}
  .day-top-line{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:3px;
  }
  .day-date{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--chalk-faint);
    min-width:62px;
  }
  .type-pill{
    font-family:var(--font-mono);
    font-size:9.5px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:2px 7px;
    border-radius:2px;
    font-weight:700;
  }
  .day-title{
    font-family:var(--font-body);
    font-weight:600;
    font-size:14.5px;
    color:var(--chalk);
  }
  .day-row.checked .day-title{text-decoration:line-through; text-decoration-color:var(--chalk-faint);}
  .day-detail{
    font-family:var(--font-body);
    font-size:12.5px;
    color:var(--chalk-dim);
    line-height:1.4;
  }

  .pill-vo2{background:rgba(193,84,44,0.2); color:var(--rust);}
  .pill-threshold{background:rgba(224,136,59,0.2); color:var(--amber);}
  .pill-zone2{background:rgba(110,155,179,0.2); color:var(--sky);}
  .pill-long{background:rgba(79,157,140,0.2); color:var(--teal);}
  .pill-football{background:rgba(142,122,168,0.2); color:var(--violet);}
  .pill-rest{background:rgba(92,107,95,0.25); color:var(--chalk-dim);}
  .pill-race{background:rgba(217,164,65,0.25); color:var(--gold);}
  .pill-gym{background:transparent; border:1px solid var(--steel); color:var(--steel);}
  .pill-gym-rest{background:transparent; border:1px dashed var(--chalk-faint); color:var(--chalk-faint);}

  /* ADD ACTIVITY */
  .add-row{margin-top:6px; display:flex; align-items:center;}
  .add-btn{
    background:none;
    border:1px dashed var(--line);
    color:var(--chalk-faint);
    width:22px; height:22px;
    border-radius:4px;
    font-size:14px;
    line-height:1;
    cursor:pointer;
    transition:all 0.15s;
  }
  .add-btn:hover{color:var(--gold); border-color:var(--gold);}
  .add-btn:focus-visible{outline:2px solid var(--gold); outline-offset:1px;}

  .add-form{
    margin-top:8px;
    padding:10px;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:3px;
  }
  .quick-chips{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px;}
  .chip{
    font-family:var(--font-mono);
    font-size:10.5px;
    background:var(--bg-card);
    border:1px solid var(--line);
    color:var(--chalk-dim);
    padding:4px 9px;
    border-radius:10px;
    cursor:pointer;
    transition:all 0.15s;
  }
  .chip:hover{border-color:var(--gold); color:var(--gold);}

  .add-input-row{display:flex; gap:6px;}
  .extra-input{
    flex:1;
    background:var(--bg-card);
    border:1px solid var(--line);
    color:var(--chalk);
    font-family:var(--font-body);
    font-size:12.5px;
    padding:7px 9px;
    border-radius:3px;
  }
  .extra-input:focus{outline:2px solid var(--gold); outline-offset:1px;}
  .add-confirm-btn{
    background:var(--teal);
    color:var(--bg);
    border:none;
    font-family:var(--font-mono);
    font-size:11px;
    font-weight:700;
    padding:7px 12px;
    border-radius:3px;
    cursor:pointer;
  }

  .extras-list{margin-top:6px;}
  .extra-item{
    display:flex;
    align-items:center;
    gap:8px;
    padding:4px 0;
  }
  .extra-check{
    width:15px; height:15px;
    flex-shrink:0;
    border:1.5px solid var(--chalk-faint);
    border-radius:50%;
    background:none;
    cursor:pointer;
    color:var(--bg);
    font-size:9px;
    display:flex; align-items:center; justify-content:center;
    padding:0;
  }
  .extra-item.done .extra-check{background:var(--teal); border-color:var(--teal);}
  .extra-text{
    flex:1;
    font-family:var(--font-body);
    font-size:12.5px;
    color:var(--chalk-dim);
  }
  .extra-item.done .extra-text{text-decoration:line-through; color:var(--chalk-faint);}
  .extra-delete{
    background:none; border:none; color:var(--rust);
    cursor:pointer; font-size:12px; padding:0 2px;
  }

  footer{
    text-align:center;
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--chalk-faint);
    margin-top:30px;
    padding:0 18px;
  }

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:3px;}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">5K / Striker Build</div>
    <h1>Sub-<span>20</span> Tracker</h1>
    <div class="headline-row">
      <div class="clock-badge">
        <div class="num" id="countdown-num">--</div>
        <div class="lbl" id="countdown-lbl">days</div>
      </div>
      <div class="race-meta">
        <div class="race-date">Race day · Thu, Jul 23, 2026</div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        <div class="progress-text" id="progress-text">0 / 32 sessions logged</div>
      </div>
    </div>
  </header>

  <div class="section-title">Weight Log</div>
  <div class="card">
    <div class="weight-input-row">
      <input type="date" id="weight-date">
      <input type="number" id="weight-input" placeholder="Weight (kg)" step="0.1" min="20" max="200">
      <button class="log-btn" id="log-weight-btn">Log Weight</button>
    </div>
    <div class="weight-stats">
      <div class="stat"><span class="v" id="stat-latest">—</span><span class="l">Latest</span></div>
      <div class="stat"><span class="v" id="stat-change">—</span><span class="l">Since Start</span></div>
      <div class="stat"><span class="v" id="stat-entries">0</span><span class="l">Entries</span></div>
    </div>
    <div id="sparkline-wrap"></div>
    <div class="weight-log-list" id="weight-log-list"></div>
  </div>

  <div id="weeks-container"></div>

  <footer>32 sessions · Jun 22 – Jul 23, 2026 · data saved automatically</footer>

</div>

<script>
const RACE_DATE = '2026-07-23';

const PLAN = [
  { week:1, label:'Establish', days:[
    {date:'2026-06-22', day:'Mon', type:'vo2', gym:'push', title:'VO2 Max Intervals', detail:'6 × 800m @ 3:50/km pace, 2 min jog rest'},
    {date:'2026-06-23', day:'Tue', type:'zone2', gym:'pull', title:'Zone 2 + Strides', detail:'30 min easy + 4 × 15s strides after'},
    {date:'2026-06-24', day:'Wed', type:'football', gym:'legs', title:'Football', detail:'Skip standalone threshold this week — treat match intensity as threshold work'},
    {date:'2026-06-25', day:'Thu', type:'zone2', gym:'push', title:'Zone 2 Run', detail:'35 min easy'},
    {date:'2026-06-26', day:'Fri', type:'rest', gym:'pull', title:'Rest or Light Mobility', detail:'Legs need to absorb the week'},
    {date:'2026-06-27', day:'Sat', type:'football', gym:'legs', title:'Football', detail:''},
    {date:'2026-06-28', day:'Sun', type:'long', gym:null, title:'Long Run', detail:'50 min Zone 2, flat, easy'},
  ]},
  { week:2, label:'Build', days:[
    {date:'2026-06-29', day:'Mon', type:'vo2', gym:'push', title:'VO2 Max Intervals', detail:'5 × 1000m @ 3:52/km, 2:30 jog rest'},
    {date:'2026-06-30', day:'Tue', type:'zone2', gym:'pull', title:'Zone 2 + Strides', detail:'30 min easy + 6 × 15s strides'},
    {date:'2026-07-01', day:'Wed', type:'threshold', gym:'legs', title:'Threshold Run', detail:'20 min continuous @ 4:50/km (or 2×10min, 2min rest if legs heavy)'},
    {date:'2026-07-02', day:'Thu', type:'football', gym:'push', title:'Football', detail:''},
    {date:'2026-07-03', day:'Fri', type:'zone2', gym:'pull', title:'Zone 2 Run', detail:'30 min easy, very relaxed'},
    {date:'2026-07-04', day:'Sat', type:'football', gym:'legs', title:'Football / Match', detail:''},
    {date:'2026-07-05', day:'Sun', type:'long', gym:null, title:'Long Run', detail:'60 min Zone 2'},
  ]},
  { week:3, label:'Peak Load', days:[
    {date:'2026-07-06', day:'Mon', type:'vo2', gym:'push', title:'VO2 Max Intervals', detail:'6 × 1000m @ 3:48/km, 2:15 jog rest — hardest session of the block'},
    {date:'2026-07-07', day:'Tue', type:'zone2', gym:'pull', title:'Zone 2 + Strides', detail:'30 min easy + 6 × 20s strides, focus on explosive turnover'},
    {date:'2026-07-08', day:'Wed', type:'threshold', gym:'legs', title:'Threshold Run', detail:'25 min continuous @ 4:50/km'},
    {date:'2026-07-09', day:'Thu', type:'football', gym:'push', title:'Football', detail:''},
    {date:'2026-07-10', day:'Fri', type:'rest', gym:'pull', title:'Rest', detail:'Full rest — no running, light stretching only'},
    {date:'2026-07-11', day:'Sat', type:'football', gym:'legs', title:'Football / Match', detail:''},
    {date:'2026-07-12', day:'Sun', type:'long', gym:null, title:'Long Run', detail:'75 min Zone 2'},
  ]},
  { week:4, label:'Sharpen, Begin Taper', days:[
    {date:'2026-07-13', day:'Mon', type:'vo2', gym:'push', title:'VO2 Max Intervals', detail:'4 × 1000m @ 3:48/km (fewer reps, same intensity)'},
    {date:'2026-07-14', day:'Tue', type:'zone2', gym:'pull', title:'Zone 2 + Strides', detail:'25 min easy + 4 × 20s strides'},
    {date:'2026-07-15', day:'Wed', type:'threshold', gym:'legs', title:'Threshold Run', detail:'15 min @ 4:50/km — shorter, sharper'},
    {date:'2026-07-16', day:'Thu', type:'football', gym:null, title:'Football', detail:'Reduce intensity if possible'},
    {date:'2026-07-17', day:'Fri', type:'rest', gym:null, title:'Rest', detail:''},
    {date:'2026-07-18', day:'Sat', type:'rest', gym:null, title:'Light Football or Rest', detail:''},
    {date:'2026-07-19', day:'Sun', type:'long', gym:null, title:'Long Run', detail:'45 min Zone 2 — pull volume down, race is close'},
  ]},
  { week:5, label:'Race Week Taper', days:[
    {date:'2026-07-20', day:'Mon', type:'threshold', gym:null, title:'Short Sharpener', detail:'4 × 400m @ 5K target pace (3:58–4:00/km), full recovery'},
    {date:'2026-07-21', day:'Tue', type:'zone2', gym:null, title:'Easy Zone 2 + Strides', detail:'20 min easy + 3 × 15s strides'},
    {date:'2026-07-22', day:'Wed', type:'rest', gym:null, title:'Rest', detail:'Complete rest, no football either'},
    {date:'2026-07-23', day:'Thu', type:'race', gym:null, title:'RACE DAY', detail:'10–15 min jog warm-up + 3 × 20s strides, then race'},
  ]},
];

const GYM_META = { push:'Push', pull:'Pull', legs:'Legs' };

const TYPE_META = {
  vo2:       {label:'VO2 Max',    pill:'pill-vo2'},
  threshold: {label:'Threshold',  pill:'pill-threshold'},
  zone2:     {label:'Zone 2',     pill:'pill-zone2'},
  long:      {label:'Long Run',   pill:'pill-long'},
  football:  {label:'Football',   pill:'pill-football'},
  rest:      {label:'Rest',       pill:'pill-rest'},
  race:      {label:'Race Day',   pill:'pill-race'},
};

let appData = { checks:{}, weights:[], extras:{} };
const TOTAL_DAYS = PLAN.reduce((sum,w)=>sum+w.days.length, 0);
const STORAGE_KEY = 'sub20-tracker';
let openAddForms = new Set();

function loadData(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved){
      const parsed = JSON.parse(saved);
      appData = {
        checks: parsed.checks || {},
        weights: parsed.weights || [],
        extras: parsed.extras || {}
      };
    }
  }catch(e){
    console.error(e);
  }
}

function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
  }catch(e){
    console.error('Could not save tracker data', e);
  }
}

function fmtDate(iso){
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

function renderCountdown(){
  const today = new Date();
  today.setHours(0,0,0,0);
  const race = new Date(RACE_DATE + 'T00:00:00');
  const diff = Math.round((race - today) / 86400000);
  const numEl = document.getElementById('countdown-num');
  const lblEl = document.getElementById('countdown-lbl');
  if(diff > 0){
    numEl.textContent = diff;
    lblEl.textContent = diff === 1 ? 'day' : 'days';
  } else if(diff === 0){
    numEl.textContent = '🏁';
    lblEl.textContent = 'today';
  } else {
    numEl.textContent = '✓';
    lblEl.textContent = 'raced';
  }
}

function renderProgress(){
  const checkedCount = Object.values(appData.checks).filter(Boolean).length;
  const pct = Math.round((checkedCount / TOTAL_DAYS) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${checkedCount} / ${TOTAL_DAYS} sessions logged`;
}

function renderWeeks(){
  const container = document.getElementById('weeks-container');
  container.innerHTML = '';
  PLAN.forEach(week=>{
    const block = document.createElement('div');
    block.className = 'week-block';

    const header = document.createElement('div');
    header.className = 'week-header';
    header.innerHTML = `<span class="wk-num">Week ${week.week}</span><span class="wk-label">${week.label}</span>`;
    block.appendChild(header);

    week.days.forEach(day=>{
      const meta = TYPE_META[day.type];
      const isChecked = !!appData.checks[day.date];
      const row = document.createElement('div');
      row.className = 'day-row' + (isChecked ? ' checked' : '') + (day.type === 'race' ? ' race-day' : '');

      const box = document.createElement('div');
      box.className = 'checkbox' + (isChecked ? ' on' : '');
      box.setAttribute('role','checkbox');
      box.setAttribute('aria-checked', isChecked);
      box.setAttribute('tabindex','0');
      box.addEventListener('click', ()=> toggleDay(day.date));
      box.addEventListener('keydown', (e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); toggleDay(day.date); }});

      const gymPillHtml = day.gym
        ? `<span class="type-pill pill-gym">${GYM_META[day.gym]}</span>`
        : (day.type !== 'race' ? `<span class="type-pill pill-gym-rest">Gym Rest</span>` : '');

      const extras = appData.extras[day.date] || [];
      const extrasHtml = extras.map(ex => `
        <div class="extra-item ${ex.done ? 'done' : ''}">
          <button class="extra-check" data-date="${day.date}" data-id="${ex.id}">${ex.done ? '✓' : ''}</button>
          <span class="extra-text">${ex.text}</span>
          <button class="extra-delete" data-date="${day.date}" data-id="${ex.id}" aria-label="Remove">✕</button>
        </div>
      `).join('');

      const isFormOpen = openAddForms.has(day.date);

      const content = document.createElement('div');
      content.className = 'day-content';
      content.innerHTML = `
        <div class="day-top-line">
          <span class="day-date">${day.day} ${fmtDate(day.date)}</span>
          <span class="type-pill ${meta.pill}">${meta.label}</span>
          ${gymPillHtml}
        </div>
        <div class="day-title">${day.title}</div>
        ${day.detail ? `<div class="day-detail">${day.detail}</div>` : ''}
        <div class="extras-list">${extrasHtml}</div>
        <div class="add-row">
          <button class="add-btn" data-date="${day.date}" aria-label="Add activity">+</button>
        </div>
        <div class="add-form" data-date="${day.date}" style="display:${isFormOpen ? 'block' : 'none'}">
          <div class="quick-chips">
            <button class="chip" data-date="${day.date}" data-text="Yoga">+ Yoga</button>
            <button class="chip" data-date="${day.date}" data-text="Mobility">+ Mobility</button>
            <button class="chip" data-date="${day.date}" data-text="Plyometrics">+ Plyo</button>
            <button class="chip" data-date="${day.date}" data-text="Extra Football">+ Football</button>
          </div>
          <div class="add-input-row">
            <input type="text" class="extra-input" data-date="${day.date}" placeholder="Custom activity...">
            <button class="add-confirm-btn" data-date="${day.date}">Add</button>
          </div>
        </div>
      `;

      row.appendChild(box);
      row.appendChild(content);
      block.appendChild(row);
    });

    container.appendChild(block);
  });

  attachExtraListeners();
}

function attachExtraListeners(){
  document.querySelectorAll('.add-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const date = btn.dataset.date;
      if(openAddForms.has(date)) openAddForms.delete(date);
      else openAddForms.add(date);
      renderWeeks();
      if(openAddForms.has(date)){
        const input = document.querySelector(`.extra-input[data-date="${date}"]`);
        if(input) input.focus();
      }
    });
  });

  document.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click', ()=> addExtra(chip.dataset.date, chip.dataset.text));
  });

  document.querySelectorAll('.add-confirm-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const input = document.querySelector(`.extra-input[data-date="${btn.dataset.date}"]`);
      if(input && input.value.trim()) addExtra(btn.dataset.date, input.value.trim());
    });
  });

  document.querySelectorAll('.extra-input').forEach(input=>{
    input.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter' && input.value.trim()) addExtra(input.dataset.date, input.value.trim());
    });
  });

  document.querySelectorAll('.extra-check').forEach(btn=>{
    btn.addEventListener('click', ()=> toggleExtraDone(btn.dataset.date, btn.dataset.id));
  });

  document.querySelectorAll('.extra-delete').forEach(btn=>{
    btn.addEventListener('click', ()=> deleteExtra(btn.dataset.date, btn.dataset.id));
  });
}

async function addExtra(date, text){
  if(!appData.extras[date]) appData.extras[date] = [];
  appData.extras[date].push({ id: 'ex-' + Date.now() + '-' + Math.random().toString(36).slice(2,7), text, done:false });
  openAddForms.delete(date);
  await saveData();
  renderWeeks();
}

async function toggleExtraDone(date, id){
  const list = appData.extras[date] || [];
  const item = list.find(e=> e.id === id);
  if(item) item.done = !item.done;
  await saveData();
  renderWeeks();
}

async function deleteExtra(date, id){
  appData.extras[date] = (appData.extras[date] || []).filter(e=> e.id !== id);
  await saveData();
  renderWeeks();
}

async function toggleDay(date){
  appData.checks[date] = !appData.checks[date];
  await saveData();
  renderWeeks();
  renderProgress();
}

function renderWeightStats(){
  const sorted = [...appData.weights].sort((a,b)=> a.date.localeCompare(b.date));
  document.getElementById('stat-entries').textContent = sorted.length;
  if(sorted.length === 0){
    document.getElementById('stat-latest').textContent = '—';
    document.getElementById('stat-change').textContent = '—';
    return;
  }
  const latest = sorted[sorted.length-1];
  document.getElementById('stat-latest').textContent = latest.kg.toFixed(1) + ' kg';
  const first = sorted[0];
  const delta = latest.kg - first.kg;
  const sign = delta > 0 ? '+' : '';
  document.getElementById('stat-change').textContent = sorted.length > 1 ? `${sign}${delta.toFixed(1)} kg` : '—';
}

function renderSparkline(){
  const wrap = document.getElementById('sparkline-wrap');
  const sorted = [...appData.weights].sort((a,b)=> a.date.localeCompare(b.date));
  if(sorted.length < 2){
    wrap.innerHTML = '';
    return;
  }
  const w = 600, h = 60, pad = 6;
  const vals = sorted.map(e=>e.kg);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = (max - min) || 1;
  const stepX = (w - pad*2) / (sorted.length - 1);
  const points = sorted.map((e,i)=>{
    const x = pad + i*stepX;
    const y = h - pad - ((e.kg - min)/range) * (h - pad*2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const path = 'M ' + points.join(' L ');
  wrap.innerHTML = `
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <polyline points="${points.join(' ')}" fill="none" stroke="#D9A441" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      ${points.map(p=>{
        const [x,y] = p.split(',');
        return `<circle cx="${x}" cy="${y}" r="2.5" fill="#F2EFE4"/>`;
      }).join('')}
    </svg>
  `;
}

function renderWeightList(){
  const list = document.getElementById('weight-log-list');
  const sorted = [...appData.weights].sort((a,b)=> b.date.localeCompare(a.date));
  if(sorted.length === 0){
    list.innerHTML = '<div class="empty-note">No entries yet — log today\'s weight above to start tracking.</div>';
    return;
  }
  list.innerHTML = sorted.map(e=>`
    <div class="weight-row">
      <span class="d">${fmtDate(e.date)}</span>
      <span class="w">${e.kg.toFixed(1)} kg</span>
      <button class="delete-w" data-date="${e.date}" aria-label="Delete entry">✕</button>
    </div>
  `).join('');
  list.querySelectorAll('.delete-w').forEach(btn=>{
    btn.addEventListener('click', ()=> deleteWeight(btn.dataset.date));
  });
}

async function deleteWeight(date){
  appData.weights = appData.weights.filter(e=> e.date !== date);
  await saveData();
  renderAllWeight();
}

function renderAllWeight(){
  renderWeightStats();
  renderSparkline();
  renderWeightList();
}

async function logWeight(){
  const dateInput = document.getElementById('weight-date');
  const weightInput = document.getElementById('weight-input');
  const date = dateInput.value;
  const kg = parseFloat(weightInput.value);
  if(!date || isNaN(kg) || kg <= 0){
    weightInput.focus();
    return;
  }
  appData.weights = appData.weights.filter(e=> e.date !== date);
  appData.weights.push({date, kg});
  await saveData();
  weightInput.value = '';
  renderAllWeight();
}

document.getElementById('log-weight-btn').addEventListener('click', logWeight);
document.getElementById('weight-input').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter') logWeight();
});

(async function init(){
  const todayISO = new Date().toISOString().split('T')[0];
  document.getElementById('weight-date').value = todayISO;

  loadData();
  renderCountdown();
  renderProgress();
  renderWeeks();
  renderAllWeight();
})();
</script>
</body>
</html>
